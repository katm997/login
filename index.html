<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phần mềm | Quản trị Admin </title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2 family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    :root {
      --accent: #2dd4bf;
      --accent-glow: rgba(45, 212, 191, 0.25);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.3);
      --bg-dark: #060814;
      --sidebar-bg: rgba(13, 18, 36, 0.8);
      --card-bg: rgba(20, 27, 54, 0.6);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #f8fafc;
      --text-dim: #64748b;
      --danger: #f43f5e;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body { 
      background-color: var(--bg-dark); 
      color: var(--text-main); 
      display: flex; 
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(125deg, #060814, #0b112c, #16113a, #051824);
      background-size: 400% 400%;
      animation: meshGradient 15s ease infinite;
    }
    @keyframes meshGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }


    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
      padding: 16px 24px; border-radius: 14px; border: 1px solid var(--card-border);
      color: white; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); min-width: 300px;
    }
    .toast.success { border-color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
    .toast.error { border-color: var(--danger); box-shadow: 0 0 15px rgba(244, 63, 94, 0.1); }

    #loginBox {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .login-card {
      background: rgba(13, 17, 39, 0.45); backdrop-filter: blur(25px);
      padding: 50px 45px; border-radius: 32px; width: 440px;
      border: 1px solid rgba(255,255,255,0.07); text-align: center;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .login-card h2 { margin-bottom: 30px; font-weight: 800; font-size: 26px; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .login-card input {
      width: 100%; padding: 16px; margin-bottom: 18px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06); background: rgba(0, 0, 0, 0.25); 
      color: white; outline: none; font-size: 15px; transition: all 0.3s;
    }
    .login-card input:focus {
      border-color: var(--purple); background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 20px var(--purple-glow);
    }


    .shimmer-btn {
      position: relative; overflow: hidden;
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--purple), #6366f1); color: #fff;
      border: none; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.35);
    }
    .shimmer-btn::after {
      content: ''; position: absolute; top: -50%; left: -60%; width: 30%; height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
      transform: rotate(30deg);
      animation: shimmer 3.5s infinite;
    }
    @keyframes shimmer {
      100% { left: 130%; }
    }
    .shimmer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5); }
    .shimmer-btn:active { transform: translateY(1px); }


    #adminBox { display: none; width: 100%; }

    aside {
      width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(20px); color: white;
      padding: 35px 24px; display: flex; flex-direction: column; position: fixed; height: 100vh;
      border-right: 1px solid var(--card-border); z-index: 99;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 45px; display: flex; align-items: center; gap: 12px; text-shadow: 0 0 15px rgba(45, 212, 191, 0.3); }

    .nav-btn {
      padding: 14px 18px; border-radius: 14px; color: #94a3b8; text-decoration: none;
      display: flex; align-items: center; gap: 14px; margin-bottom: 10px; cursor: pointer;
      font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-btn:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
    .nav-btn.active { background: linear-gradient(90deg, rgba(45, 212, 191, 0.12), transparent); color: var(--accent); border-left: 4px solid var(--accent); padding-left: 14px; }
    .logout-btn { margin-top: auto; color: #fda4af; }
    .logout-btn:hover { background: rgba(244, 63, 94, 0.08); color: var(--danger); }

    main { flex: 1; margin-left: 280px; padding: 45px; position: relative; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    header h1 { font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
    
    .search-bar { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--card-border); padding: 14px 22px; border-radius: 16px; width: 380px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; }
    .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); background: rgba(0, 0, 0, 0.4); }
    .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; background: transparent; color: white; }

    .grid-container { display: grid; grid-template-columns: 420px 1fr; gap: 35px; }


    .editor-card { 
      background: var(--card-bg); backdrop-filter: blur(15px); padding: 35px; border-radius: 28px; 
      border: 1px solid var(--card-border); height: fit-content; position: sticky; top: 40px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
    }
    .editor-card h3 { margin-bottom: 25px; font-size: 19px; font-weight: 700; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; color: #64748b; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); border-radius: 14px; color: white; outline: none; transition: all 0.3s; }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

    #saveBtn {
      width: 100%; padding: 16px; background: #fff; color: #000;
      border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #saveBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
    #saveBtn.editing { background: linear-gradient(135deg, var(--accent), #0d9488); color: #000; box-shadow: 0 4px 15px var(--accent-glow); }
    #saveBtn:active { transform: translateY(1px); }


    .folder-section { margin-bottom: 25px; background: rgba(255, 255, 255, 0.01); border-radius: 24px; padding: 8px; border: 1px solid rgba(255,255,255,0.02); }
    
    .folder-title {
      cursor: pointer; user-select: none; padding: 16px 20px; border-radius: 16px;
      transition: all 0.25s; display: flex; align-items: center; gap: 12px; font-weight: 700;
    }
    .folder-title:hover { background: rgba(255, 255, 255, 0.03); color: var(--accent); }
    .folder-title i.fa-chevron-down { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); color: #475569; }
    .rotate-icon { transform: rotate(-90deg); }

    .folder-content {
      max-height: 3000px; opacity: 1; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      padding: 12px 6px 6px 6px;
    }
    .folder-content.hidden { max-height: 0; opacity: 0; padding: 0; pointer-events: none; }
    
    .manage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
    
    .manage-item {
      background: var(--card-bg); backdrop-filter: blur(10px); padding: 22px; border-radius: 18px; border: 1px solid var(--card-border);
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .manage-item:hover { 
      border-color: rgba(45, 212, 191, 0.35); transform: translateY(-4px); 
      box-shadow: 0 15px 30px -5px rgba(0,0,0,0.4), 0 0 20px rgba(45, 212, 191, 0.04); 
    }
    .item-info h4 { font-size: 15px; margin-bottom: 6px; font-weight: 600; }
    .item-info p { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 6px; }

    .action-btns { display: flex; gap: 8px; }
    .btn-icon { width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
    .btn-edit { background: rgba(255,255,255,0.04); color: var(--text-main); }
    .btn-delete { background: rgba(244, 63, 94, 0.08); color: var(--danger); }
    .btn-edit:hover { background: var(--accent); color: #000; transform: scale(1.08); }
    .btn-delete:hover { background: var(--danger); color: #fff; transform: scale(1.08); box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); }

    /* ===== STATS TABLES ===== */
    .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
    .stats-table th { text-align: left; padding: 18px 24px; color: #64748b; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stats-table td { padding: 18px 24px; background: rgba(16, 23, 49, 0.4); border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); }
    .stats-table td:first-child { border-left: 1px solid var(--card-border); border-top-left-radius: 16px; border-bottom-left-radius: 16px; }
    .stats-table td:last-child { border-right: 1px solid var(--card-border); border-top-right-radius: 16px; border-bottom-right-radius: 16px; }
    .badge-count { background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(99, 102, 241, 0.15)); color: #ca8a04; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 13px; border: 1px solid rgba(234, 179, 8, 0.3); color: #f59e0b; }
  </style>
</head>

<body>

  <div id="toast-container"></div>

  <div id="loginBox">
    <div class="login-card animate__animated animate__fadeInUp">
      <i class="fas fa-user-shield animate__animated animate__pulse animate__infinite" style="font-size: 48px; color: var(--purple); margin-bottom: 25px; filter: drop-shadow(0 0 10px var(--purple-glow));"></i>
      <h2>Đăng nhập Hệ thống</h2>
      <input id="user" placeholder="Tài khoản admin" onkeyup="if(event.key === 'Enter') login()">
      <input id="pass" type="password" placeholder="Mật khẩu bảo mật" onkeyup="if(event.key === 'Enter') login()">
      <button onclick="login()" class="shimmer-btn"><i class="fas fa-sign-in-alt"></i> Tiếp tục</button>
      <p id="loginMsg"></p>
    </div>
  </div>

  <div id="adminBox">
    <aside>
      <div class="logo"><i class="fas fa-bolt"></i> Admin</div>
      
      <div class="nav-btn active" id="tab-manage"><i class="fas fa-box"></i> Kho ứng dụng</div>
      <div class="nav-btn" id="tab-stats"><i class="fas fa-chart-pie"></i> Thống kê báo cáo</div>

      <div class="nav-btn logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Đăng xuất hệ thống
      </div>
    </aside>

    <main>
      <header>
        <div>
          <h1 id="mainTitle" class="animate__animated animate__fadeInDown">Quản lý kho ứng dụng</h1>
        </div>
        <div class="search-bar animate__animated animate__fadeIn" id="topSearch">
          <i class="fas fa-search" style="color: #475569;"></i>
          <input type="text" id="searchBox" placeholder="Nhập tên sản phẩm để lọc...">
        </div>
      </header>

      <div class="grid-container" id="content-manage">
        <section class="editor-card animate__animated animate__fadeInLeft">
          <h3 id="formTitle">Tạo mới phần mềm</h3>
          <div class="form-group">
            <label>Tên phần mềm</label>
            <input id="softname" placeholder="Ví dụ: Photoshop CC 2026">
          </div>
          <div class="form-group">
            <label>Đường dẫn tải xuống (Cloud Link)</label>
            <input id="link" placeholder="https://drive.google.com/...">
          </div>
          <div class="form-group">
            <label>Danh mục / Thư mục phân loại</label>
            <input id="folder" placeholder="Ví dụ: Đồ họa, Văn phòng">
          </div>
          <button id="saveBtn"><i class="fas fa-save"></i> LƯU DỮ LIỆU CHUNG</button>
          <button id="cancelBtn" style="display:none; width:100%; margin-top:12px; background:none; border:none; color:#64748b; cursor:pointer; font-weight:600;"><i class="fas fa-times"></i> Hủy thao tác</button>
        </section>

        <section id="manageList" class="animate__animated animate__fadeInRight"></section>
      </div>

      <div id="content-stats" style="display:none;">
        <div class="editor-card animate__animated animate__fadeInUp" style="width: 100%;">
          <h3><i class="fas fa-fire-alt" style="color: #f59e0b; margin-right: 8px;"></i> Bảng xếp hạng lượt tải ứng dụng</h3>
          <table class="stats-table">
            <thead>
              <tr>
                <th>Tên sản phẩm phần mềm</th>
                <th>Phân loại danh mục</th>
                <th style="text-align: center; width: 200px;">Lượng tải xuống</th>
              </tr>
            </thead>
            <tbody id="statsTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, 
      query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCySHDY4nar2nzG6WdYMRDM8Y0aovVbJHQ",
      projectId: "kkkk-29e4e",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allData = [];
    window.editingId = null;


    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type} animate__animated animate__fadeInRight`;
      
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      const iconColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
      
      toast.innerHTML = `
        <i class="fas ${icon}" style="color: ${iconColor}; font-size: 16px;"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.className = toast.className.replace('animate__fadeInRight', 'animate__fadeOutRight');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    };


    window.login = () => {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;
      const msg = document.getElementById("loginMsg");
      if (u.toLowerCase() === "admin" && p === "TTDT@2025") {
        sessionStorage.setItem("adminLogin", "true");
        const card = document.querySelector('.login-card');
        card.classList.remove('animate__fadeInUp');
        card.classList.add('animate__backOutDown');
        setTimeout(() => {
          checkAuth();
          showToast("Đăng nhập hệ thống SoftHub thành công!");
        }, 500);
      } else {
        msg.style.color = "var(--danger)";
        msg.style.marginTop = "15px";
        msg.innerText = "Tài khoản hoặc mật khẩu bảo mật sai!";
        msg.className = "animate__animated animate__shakeX";
        setTimeout(() => msg.className = "", 500);
      }
    };

    window.logout = () => {
      sessionStorage.removeItem("adminLogin");
      location.reload();
    };

    const checkAuth = () => {
      if (sessionStorage.getItem("adminLogin") === "true") {
        document.getElementById("loginBox").style.opacity = "0";
        setTimeout(() => {
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("adminBox").style.display = "block";
        }, 500);
      }
    };
    checkAuth();


    const q = query(collection(db, "download"), orderBy("time", "desc"));
    onSnapshot(q, snap => {
      allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList(allData);
      renderStats();
    });


    function renderList(data) {
      const container = document.getElementById("manageList");
      container.innerHTML = "";
      
      const grouped = {};
      data.forEach(item => {
        const f = item.folder || "Chưa phân loại";
        if (!grouped[f]) grouped[f] = [];
        grouped[f].push(item);
      });

      for (const folder in grouped) {
        const section = document.createElement("div");
        section.className = "folder-section animate__animated animate__fadeInUp";
        
        const folderId = "folder-" + Math.random().toString(36).substr(2, 9);

        section.innerHTML = `
          <div class="folder-title" onclick="toggleFolder('${folderId}', '${folder.replace(/'/g,"\\'")}')">
            <i class="fas fa-chevron-down" id="icon-${folderId}"></i> 
            <span>${folder}</span> <span style="color: var(--accent); font-size:14px; margin-left:4px;">(${grouped[folder].length})</span>
          </div>
          
          <div class="manage-grid folder-content" id="${folderId}">
            ${grouped[folder].map(item => `
              <div class="manage-item">
                <div class="item-info">
                  <h4 style="letter-spacing: -0.3px;">${item.name}</h4>
                  <p><i class="fas fa-link" style="color: var(--accent);"></i> ${item.link.substring(0, 24)}...</p>
                </div>
                <div class="action-btns">
                  <button class="btn-icon btn-edit" onclick="editMode('${item.id}', '${item.name.replace(/'/g,"\\'")}', '${item.link.replace(/'/g,"\\'")}', '${item.folder.replace(/'/g,"\\'")}')">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
            `).join("")}
          </div>
        `;
        container.appendChild(section);
      }
    }

    window.toggleFolder = (id, folderName) => {
      const content = document.getElementById(id);
      const icon = document.getElementById('icon-' + id);
      const folderInput = document.getElementById('folder');

      folderInput.value = folderName;
      folderInput.focus(); 

      if (content.classList.contains('hidden')) {
        content.classList.remove('hidden'); 
        icon.classList.remove('rotate-icon'); 
      } else {
        content.classList.add('hidden'); 
        icon.classList.add('rotate-icon'); 
      }
    };
       
    function renderStats() {
      const tbody = document.getElementById("statsTableBody");
      const sorted = [...allData].sort((a, b) => (b.downloads || 0) - (a.downloads || 0));
      tbody.innerHTML = sorted.map(item => `
        <tr class="animate__animated animate__fadeInUp">
          <td style="font-weight:600;"><i class="fab fa-apple" style="margin-right:10px; color:var(--purple);"></i>${item.name}</td>
          <td style="color:#64748b;">${item.folder}</td>
          <td style="text-align:center;"><span class="badge-count">${(item.downloads || 0).toLocaleString()} lần</span></td>
        </tr>
      `).join("");
    }

    // TAB NAVIGATION
    document.getElementById("tab-manage").onclick = () => showTab('manage');
    document.getElementById("tab-stats").onclick = () => showTab('stats');

    function showTab(type) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if(type === 'manage') {
        document.getElementById("tab-manage").classList.add('active');
        document.getElementById("content-manage").style.display = "grid";
        document.getElementById("content-stats").style.display = "none";
        document.getElementById("topSearch").style.visibility = "visible";
        document.getElementById("mainTitle").innerText = "Quản lý kho ứng dụng";
      } else {
        document.getElementById("tab-stats").classList.add('active');
        document.getElementById("content-manage").style.display = "none";
        document.getElementById("content-stats").style.display = "block";
        document.getElementById("topSearch").style.visibility = "hidden";
        document.getElementById("mainTitle").innerText = "Thống kê hệ thống";
        renderStats();
      }
    }

    const saveBtn = document.getElementById("saveBtn");
    saveBtn.onclick = async () => {
      const name = document.getElementById("softname").value;
      const link = document.getElementById("link").value;
      const folder = document.getElementById("folder").value;
      if (!name || !link || !folder) return showToast("Vui lòng điền đầy đủ các thông tin!", "error");

      try {
        if (window.editingId) {
          await updateDoc(doc(db, "download", window.editingId), { name, link, folder, time: Date.now() });
          showToast("Cập nhật phần mềm thành công!");
          resetForm();
        } else {
          await addDoc(collection(db, "download"), { name, link, folder, time: Date.now(), downloads: 0 });
          showToast("Thêm mới phần mềm thành công!");
          resetForm();
        }
      } catch (err) {
        showToast("Lỗi đồng bộ Firebase!", "error");
      }
    };

    window.editMode = (id, name, link, folder) => {
      window.editingId = id;
      document.getElementById("softname").value = name;
      document.getElementById("link").value = link;
      document.getElementById("folder").value = folder;
      document.getElementById("formTitle").innerHTML = '<i class="fas fa-pen-alt" style="color:var(--accent)"></i> Cập nhật ứng dụng';
      saveBtn.innerHTML = '<i class="fas fa-check-double"></i> XÁC NHẬN CẬP NHẬT';
      saveBtn.className = "editing";
      document.getElementById("cancelBtn").style.display = "block";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.resetForm = () => {
      window.editingId = null;
      document.getElementById("softname").value = "";
      document.getElementById("link").value = "";
      document.getElementById("folder").value = "";
      document.getElementById("formTitle").innerText = "Tạo mới phần mềm";
      saveBtn.innerHTML = '<i class="fas fa-save"></i> LƯU DỮ LIỆU CHUNG';
      saveBtn.className = "";
      document.getElementById("cancelBtn").style.display = "none";
    };

    document.getElementById("cancelBtn").onclick = resetForm;

    window.deleteItem = async (id) => {
      if (confirm("Xác nhận gỡ phần mềm này khỏi cơ sở dữ liệu?")) {
        try {
          await deleteDoc(doc(db, "download", id));
          showToast("Đã xóa phần mềm thành công!", "success");
        } catch(e) {
          showToast("Lỗi khi xóa dữ liệu!", "error");
        }
      }
    };

    document.getElementById("searchBox").oninput = (e) => {
      const kw = e.target.value.toLowerCase();
      const filtered = allData.filter(i => i.name.toLowerCase().includes(kw) || i.folder.toLowerCase().includes(kw));
      renderList(filtered);
    };
  </script>
</body>
</html>
