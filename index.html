<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Quản lý tải về</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2563eb;
  --danger: #ef4444;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== LOGIN ===== */
.login-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  padding: 2.2rem;
  border-radius: 18px;
  width: 360px;
  box-shadow: 0 20px 40px rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.15);
}

.login-card h2 {
  color: #e5e7eb;
  text-align: center;
  margin-bottom: 22px;
}

.login-card input {
  width: 100%;
  padding: 12px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1);
  color: #fff;
  outline: none;
}

.login-card input::placeholder {
  color: #cbd5f5;
}

.login-card button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.login-card p {
  color: #fca5a5;
  text-align: center;
  margin-top: 12px;
}

/* ===== ADMIN ===== */
.admin-card {
  display: none; /* QUAN TRỌNG */
  background: white;
  width: 520px;
  height: 85vh;
  border-radius: 18px;
  padding: 1.5rem;
  box-shadow: 0 20px 40px rgba(0,0,0,.35);
  display: flex;
  flex-direction: column;
}

.logout {
  text-align: right;
}

.logout button {
  border: none;
  background: #e5e7eb;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.admin-form {
  background: #f9fafb;
  padding: 14px;
  border-radius: 12px;
  margin: 10px 0;
}

.admin-form input {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

#saveBtn {
  width: 100%;
  padding: 10px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

.item-list {
  flex: 1;
  overflow-y: auto;
}

.manage-item {
  display: flex;
  justify-content: space-between;
  background: #f3f4f6;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
}

.delete-btn {
  background: #fee2e2;
  color: var(--danger);
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
#searchBox {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: .9rem;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-card" id="loginBox">
  <h2>Đăng nhập Admin</h2>
  <input id="user" placeholder="Tài khoản">
  <input id="pass" type="password" placeholder="Mật khẩu">
  <button onclick="login()">ĐĂNG NHẬP</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN -->
<div class="admin-card" id="adminBox">
  <div class="logout">
    <button onclick="logout()">Đăng xuất</button>
  </div>

  <h2>Thêm phần mềm</h2>

  <div class="admin-form">
    <input id="softname" placeholder="Tên phần mềm">
    <input id="link" placeholder="Link tải">
    <button id="saveBtn">LƯU DỮ LIỆU</button>
  </div>
<div class="admin-form">
  <input id="searchBox" placeholder="🔍 Tìm phần mềm...">
</div>
  <h3>Danh sách hiện có</h3>
  <div id="manageList" class="item-list">Đang tải...</div>
</div>

<script type="module">
/* ===== LOGIN ===== */
const ADMIN_USER = "admin";
const ADMIN_PASS = "TTDT@2025";

const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");

window.login = () => {
  if (
    user.value.trim().toLowerCase() === ADMIN_USER &&
    pass.value === ADMIN_PASS
  ) {
    sessionStorage.setItem("adminLogin", "1");
    loginBox.style.display = "none";
    adminBox.style.display = "flex";
  } else {
    loginMsg.innerText = "❌ Sai tài khoản hoặc mật khẩu";
  }
};

/* ENTER để login */
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && loginBox.style.display !== "none") {
    login();
  }
});

window.logout = () => {
  sessionStorage.removeItem("adminLogin");
  location.reload();
};

/* Khi load trang */
if (sessionStorage.getItem("adminLogin") === "1") {
  loginBox.style.display = "none";
  adminBox.style.display = "flex";
} else {
  loginBox.style.display = "block";
  adminBox.style.display = "none";
}

/* ===== FIREBASE ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  deleteDoc, doc, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCySHDY4nar2nzG6WdYMRDM8Y0aovVbJHQ",
  authDomain: "kkkk-29e4e.firebaseapp.com",
  projectId: "kkkk-29e4e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

saveBtn.onclick = async () => {
  if (!softname.value || !link.value) return alert("Thiếu thông tin!");
  await addDoc(collection(db, "download"), {
    name: softname.value,
    link: link.value,
    time: Date.now()
  });
  softname.value = link.value = "";
};

window.deleteItem = async (id) => {
  if (confirm("Xóa mục này?")) {
    await deleteDoc(doc(db, "download", id));
  }
};

let allData = [];

const q = query(collection(db, "download"), orderBy("time", "desc"));
onSnapshot(q, snap => {
  allData = [];
  snap.forEach(d => {
    allData.push({ id: d.id, ...d.data() });
  });
  renderList(allData);
});

function renderList(data) {
  manageList.innerHTML = "";
  if (data.length === 0) {
    manageList.innerHTML = "<i>Không có kết quả</i>";
    return;
  }
  data.forEach(item => {
    manageList.innerHTML += `
      <div class="manage-item">
        <span>${item.name}</span>
        <button class="delete-btn" onclick="deleteItem('${item.id}')">XÓA</button>
      </div>`;
  });
}

/* Tìm kiếm realtime */
searchBox.addEventListener("input", () => {
  const key = searchBox.value.toLowerCase();
  const filtered = allData.filter(item =>
    item.name.toLowerCase().includes(key)
  );
  renderList(filtered);
});
</script>

</body>
</html>
