<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftHub | Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #2dd4bf;
      --accent-hover: #14b8a6;
      --bg-dark: #0f172a;
      --sidebar-bg: #1e293b;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-dim: #64748b;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body { background-color: #f8fafc; color: var(--text-main); display: flex; min-height: 100vh; }

    /* ===== LOGIN OVERLAY ===== */
    #loginBox {
      position: fixed; inset: 0; z-index: 1000;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
      padding: 40px; border-radius: 24px; width: 400px;
      border: 1px solid rgba(255,255,255,0.1); text-align: center; color: white;
    }
    .login-card h2 { margin-bottom: 25px; font-weight: 700; }
    .login-card input {
      width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px;
      border: none; background: rgba(255,255,255,0.05); color: white; outline: none;
    }
    .login-card button {
      width: 100%; padding: 14px; background: var(--accent); color: #000;
      border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
    }

    /* ===== MAIN LAYOUT ===== */
    #adminBox { display: none; width: 100%; }

    aside {
      width: 280px; background: var(--sidebar-bg); color: white;
      padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

    .nav-btn {
      padding: 14px; border-radius: 12px; color: #94a3b8; text-decoration: none;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer;
    }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: white; }
    .logout-btn { margin-top: auto; color: #fca5a5; }

    main { flex: 1; margin-left: 280px; padding: 40px; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .search-bar { background: white; border: 1px solid #e2e8f0; padding: 12px 20px; border-radius: 12px; width: 350px; display: flex; align-items: center; gap: 10px; }
    .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; }

    .grid-container { display: grid; grid-template-columns: 400px 1fr; gap: 30px; }

    /* ===== FORM SECTION ===== */
    .editor-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 40px; }
    .editor-card h3 { margin-bottom: 20px; font-size: 18px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.1); }

    #saveBtn {
      width: 100%; padding: 14px; background: var(--bg-dark); color: white;
      border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    #saveBtn.editing { background: var(--accent); color: #000; }

    /* ===== LIST SECTION ===== */
    .folder-section { margin-bottom: 30px; }
    .folder-title { font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--text-dim); }
    
    .manage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .manage-item {
      background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .manage-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    .item-info h4 { font-size: 15px; margin-bottom: 4px; }
    .item-info p { font-size: 12px; color: var(--text-dim); }

    .action-btns { display: flex; gap: 8px; }
    .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .btn-edit { background: #f1f5f9; color: var(--text-main); }
    .btn-delete { background: #fef2f2; color: var(--danger); }
    .btn-edit:hover { background: #e2e8f0; }
    .btn-delete:hover { background: #fee2e2; }

    /* ===== THỐNG KÊ STYLE ===== */
    .stats-table { width: 100%; border-collapse: collapse; }
    .stats-table th { text-align: left; background: #f8fafc; padding: 15px; border-bottom: 2px solid #e2e8f0; }
    .stats-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
    .badge-count { background: #f0fdf4; color: #166534; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 13px; }
    /* 1. Mặc định là hiện, khi có class .hidden thì ẩn đi */
.folder-content {
  display: block;
}
.folder-content.hidden {
  display: none;
}

/* 2. Làm cho tiêu đề thư mục đẹp hơn và có hình bàn tay khi rà chuột vào */
.folder-title {
  cursor: pointer; 
  user-select: none;
  padding: 8px 12px;
  border-radius: 10px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.folder-title:hover {
  background: rgba(45, 212, 191, 0.1); /* Màu xanh nhạt khi rà chuột */
}

/* 3. Hiệu ứng xoay mũi tên */
.folder-title i.fa-chevron-down {
  transition: transform 0.3s;
}
.rotate-icon {
  transform: rotate(-90deg);
}
  </style>
</head>

<body>

  <div id="loginBox">
    <div class="login-card">
      <i class="fas fa-user-shield" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
      <h2>Đăng nhập Admin</h2>
      <input id="user" placeholder="Account" onkeyup="if(event.key === 'Enter') login()">
<input id="pass" type="password" placeholder="Password" onkeyup="if(event.key === 'Enter') login()">
      <button onclick="login()">Đăng nhập</button>
      <p id="loginMsg" style="color: #fca5a5; margin-top: 15px; font-size: 13px;"></p>
    </div>
  </div>

  <div id="adminBox">
    <aside>
      <div class="logo"><i class="fas fa-bolt"></i> SoftHub Admin</div>
      
      <div class="nav-btn active" id="tab-manage"><i class="fas fa-box"></i> Quản lý phần mềm</div>
      <div class="nav-btn" id="tab-stats"><i class="fas fa-chart-line"></i> Thống kê</div>

      <div class="nav-btn logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Đăng xuất
      </div>
    </aside>

    <main>
      <header>
        <div>
          <h1 id="mainTitle">Quản lý kho ứng dụng</h1>
        </div>
        <div class="search-bar" id="topSearch">
          <i class="fas fa-search" style="color: #94a3b8;"></i>
          <input type="text" id="searchBox" placeholder="Tìm kiếm nhanh...">
        </div>
      </header>

      <div class="grid-container" id="content-manage">
        <section class="editor-card">
          <h3 id="formTitle">Tạo mới phần mềm</h3>
          <div class="form-group">
            <label>Tên phần mềm</label>
            <input id="softname" placeholder="Ví dụ: Photoshop 2024">
          </div>
          <div class="form-group">
            <label>Link tải (Google Drive, One Drive...)</label>
            <input id="link" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Thư mục phân loại</label>
            <input id="folder" placeholder="Ví dụ: Đồ họa">
          </div>
          <button id="saveBtn"><i class="fas fa-save"></i> LƯU DỮ LIỆU</button>
          <button id="cancelBtn" style="display:none; width:100%; margin-top:10px; background:none; border:none; color:var(--text-dim); cursor:pointer;">Hủy bỏ</button>
        </section>

        <section id="manageList"></section>
      </div>

      <div id="content-stats" style="display:none;">
        <div class="editor-card" style="width: 100%;">
          <h3><i class="fas fa-trophy" style="color: #f59e0b;"></i> Xếp hạng lượt tải</h3>
          <table class="stats-table">
            <thead>
              <tr>
                <th>Phần mềm</th>
                <th>Thư mục</th>
                <th style="text-align: center;">Tổng lượt tải</th>
              </tr>
            </thead>
            <tbody id="statsTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, 
      query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCySHDY4nar2nzG6WdYMRDM8Y0aovVbJHQ",
      projectId: "kkkk-29e4e",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allData = [];
    window.editingId = null;

    // LOGIN LOGIC
    window.login = () => {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;
      if (u.toLowerCase() === "admin" && p === "TTDT@2025") {
        sessionStorage.setItem("adminLogin", "true");
        checkAuth();
      } else {
        document.getElementById("loginMsg").innerText = "Sai thông tin đăng nhập!";
      }
    };

    window.logout = () => {
      sessionStorage.removeItem("adminLogin");
      location.reload();
    };

    const checkAuth = () => {
      if (sessionStorage.getItem("adminLogin") === "true") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminBox").style.display = "block";
      }
    };
    checkAuth();

    // FIREBASE REALTIME
    const q = query(collection(db, "download"), orderBy("time", "desc"));
    onSnapshot(q, snap => {
      allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList(allData);
      renderStats(); // Cập nhật bảng thống kê mỗi khi data thay đổi
    });

    // RENDER LIST QUẢN LÝ
    function renderList(data) {
  const container = document.getElementById("manageList");
  container.innerHTML = "";
  
  // Bước A: Gom nhóm dữ liệu theo thư mục
  const grouped = {};
  data.forEach(item => {
    const f = item.folder || "Chưa phân loại";
    if (!grouped[f]) grouped[f] = [];
    grouped[f].push(item);
  });

  // Bước B: Chạy vòng lặp để tạo giao diện cho từng thư mục
  for (const folder in grouped) {
    const section = document.createElement("div");
    section.className = "folder-section";
    
    // Tạo một ID ngẫu nhiên để máy tính biết chính xác đang đóng/mở thư mục nào
    const folderId = "folder-" + Math.random().toString(36).substr(2, 9);

    section.innerHTML = `
      <div class="folder-title" onclick="toggleFolder('${folderId}', '${folder.replace(/'/g,"\\'")}')">
        <i class="fas fa-chevron-down" id="icon-${folderId}"></i> 
        <span style="font-weight:700;">${folder}</span> (${grouped[folder].length})
      </div>
      
      <div class="manage-grid folder-content" id="${folderId}">
        ${grouped[folder].map(item => `
          <div class="manage-item">
            <div class="item-info">
              <h4>${item.name}</h4>
              <p><i class="fas fa-link"></i> ${item.link.substring(0, 30)}...</p>
            </div>
            <div class="action-btns">
              <button class="btn-icon btn-edit" onclick="editMode('${item.id}', '${item.name.replace(/'/g,"\\'")}', '${item.link.replace(/'/g,"\\'")}', '${item.folder.replace(/'/g,"\\'")}')">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(section);
  }
}
// Hàm này xử lý: 1. Điền tên thư mục - 2. Đóng mở danh sách
window.toggleFolder = (id, folderName) => {
  const content = document.getElementById(id);
  const icon = document.getElementById('icon-' + id);
  const folderInput = document.getElementById('folder');

  
  folderInput.value = folderName;
  folderInput.focus(); 

  
  if (content.classList.contains('hidden')) {
    content.classList.remove('hidden'); 
    icon.classList.remove('rotate-icon'); 
  } else {
    content.classList.add('hidden'); 
    icon.classList.add('rotate-icon'); 
  }
};
   
    function renderStats() {
      const tbody = document.getElementById("statsTableBody");
      const sorted = [...allData].sort((a, b) => (b.downloads || 0) - (a.downloads || 0));
      tbody.innerHTML = sorted.map(item => `
        <tr>
          <td style="font-weight:600;">${item.name}</td>
          <td style="color:var(--text-dim);">${item.folder}</td>
          <td style="text-align:center;"><span class="badge-count">${item.downloads || 0} lần</span></td>
        </tr>
      `).join("");
    }

    // TAB NAVIGATION
    document.getElementById("tab-manage").onclick = function() {
      showTab('manage');
    };
    document.getElementById("tab-stats").onclick = function() {
      showTab('stats');
    };

    function showTab(type) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if(type === 'manage') {
        document.getElementById("tab-manage").classList.add('active');
        document.getElementById("content-manage").style.display = "grid";
        document.getElementById("content-stats").style.display = "none";
        document.getElementById("topSearch").style.visibility = "visible";
        document.getElementById("mainTitle").innerText = "Quản lý kho ứng dụng";
      } else {
        document.getElementById("tab-stats").classList.add('active');
        document.getElementById("content-manage").style.display = "none";
        document.getElementById("content-stats").style.display = "block";
        document.getElementById("topSearch").style.visibility = "hidden";
        document.getElementById("mainTitle").innerText = "Thống kê hệ thống";
        renderStats();
      }
    }

    // THAO TÁC DỮ LIỆU (ADD/EDIT/DELETE)
    const saveBtn = document.getElementById("saveBtn");
    saveBtn.onclick = async () => {
      const name = document.getElementById("softname").value;
      const link = document.getElementById("link").value;
      const folder = document.getElementById("folder").value;
      if (!name || !link || !folder) return alert("Vui lòng điền đủ thông tin");

      if (window.editingId) {
        await updateDoc(doc(db, "download", window.editingId), { name, link, folder, time: Date.now() });
        resetForm();
      } else {
        await addDoc(collection(db, "download"), { name, link, folder, time: Date.now(), downloads: 0 });
        resetForm();
      }
    };

    window.editMode = (id, name, link, folder) => {
      window.editingId = id;
      document.getElementById("softname").value = name;
      document.getElementById("link").value = link;
      document.getElementById("folder").value = folder;
      document.getElementById("formTitle").innerText = "Cập nhật ứng dụng";
      saveBtn.innerHTML = '<i class="fas fa-check"></i> XÁC NHẬN CẬP NHẬT';
      saveBtn.className = "editing";
      document.getElementById("cancelBtn").style.display = "block";
      window.scrollTo(0, 0);
    };

    window.resetForm = () => {
      window.editingId = null;
      document.getElementById("softname").value = "";
      document.getElementById("link").value = "";
      document.getElementById("folder").value = "";
      document.getElementById("formTitle").innerText = "Tạo mới phần mềm";
      saveBtn.innerHTML = '<i class="fas fa-save"></i> LƯU DỮ LIỆU';
      saveBtn.className = "";
      document.getElementById("cancelBtn").style.display = "none";
    };

    document.getElementById("cancelBtn").onclick = resetForm;

    window.deleteItem = async (id) => {
      if (confirm("Xóa phần mềm này khỏi hệ thống?")) {
        await deleteDoc(doc(db, "download", id));
      }
    };

    document.getElementById("searchBox").oninput = (e) => {
      const kw = e.target.value.toLowerCase();
      const filtered = allData.filter(i => i.name.toLowerCase().includes(kw) || i.folder.toLowerCase().includes(kw));
      renderList(filtered);
    };
  </script>
</body>
</html>
